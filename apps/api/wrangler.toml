name = "docchi-api"
main = "src/index.ts"
compatibility_date = "2026-04-21"

[[d1_databases]]
binding = "DB"
database_name = "docchi"
database_id = "replace-with-real-id"

[vars]
COOKIE_NAME = "docchi_session"
TURNSTILE_SECRET = "replace-me"
DATA_TTL_DAYS = "30"
BYPASS_TURNSTILE = "true"
SESSION_HASH_SALT = "replace-with-random-secret"

[triggers]
crons = ["0 * * * *"]
